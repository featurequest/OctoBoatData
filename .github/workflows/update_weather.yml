name: Update Weather Data
on:
  schedule:
    # Every hour at :05 (slight offset avoids peak load on Open-Meteo)
    - cron: "5 * * * *"
  workflow_dispatch:   # Allow manual trigger from the Actions tab

permissions:
  contents: write      # Needed to git push updated JSON files

jobs:
  fetch-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ---- Checkout --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Python setup with caching ---------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ---- Fetch wind + waves + observations --------------------------------
      - name: Fetch weather data
        run: python scripts/fetch_weather.py

      # ---- Commit changes if any -------------------------------------------
      - name: Commit updated weather data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/weather/
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to weather data — nothing to commit."
          else
            git commit -m "chore: update weather data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
